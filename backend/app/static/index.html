<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Management API</title>
    <style>
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f7f8fb;
        color: #032147;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .card {
        background: #fff;
        border: 1px solid rgba(3, 33, 71, 0.08);
        border-radius: 16px;
        padding: 32px 40px;
        box-shadow: 0 18px 40px rgba(3, 33, 71, 0.12);
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
      }
      p {
        color: #888888;
        margin: 4px 0;
      }
      code {
        color: #209dd7;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hello from FastAPI</h1>
      <p>The backend is running.</p>
      <p>Try <code>/api/health</code> and <code>/api/hello</code>.</p>
    </div>
  </body>
</html>
